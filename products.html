<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Portfolio | Ansh Healthcare Portfolio</title>
    <meta name="description"
        content="Explore Ansh Healthcare's extensive product portfolio, including Gastro, Cardio, Neuro, and Diabetic formulations. Discover our premium healthcare solutions.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="catalog-page">

    <header class="catalog-nav">
        <div class="logo">ANSH HEALTHCARE<span>.</span></div>
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
    </header>

    <section class="catalog-hero">
        <div class="catalog-hero-inner">
            <div class="hero-badge">OUR FORMULARIES</div>
            <h1>Premium <span>Portfolio</span></h1>
            <p>Discover our comprehensive range of high-quality formulations, tailored for maximum efficacy across all
                major therapies.</p>

            <div class="modern-search">
                <input type="text" id="searchInput" placeholder="Search brands, compositions...">
                <i class="fa-solid fa-search search-icon"></i>
            </div>
        </div>
    </section>

    <div class="modern-filters">
        <button class="filter-btn active" data-cat="all">View All</button>
        <button class="filter-btn" data-cat="Gastro">Gastroenterology</button>
        <button class="filter-btn" data-cat="Cardio">Cardiology</button>
        <button class="filter-btn" data-cat="Neuro">Neurology</button>
        <button class="filter-btn" data-cat="Diabetic">Diabetology</button>
        <button class="filter-btn" data-cat="Other">Specialty</button>
    </div>

    <!-- The grid will be generated dynamically by script.js -->
    <main class="product-grid" id="mainGrid"></main>

    <div class="catalog-modal-overlay" id="catalogProductModal">
        <div class="catalog-modal-content">
            <span class="catalog-modal-close">&times;</span>
            <div class="catalog-modal-left"><img id="modalImg" src=""></div>
            <div class="catalog-modal-right">
                <span id="modalCat" class="category-tag"></span>
                <h2 id="modalTitle"></h2>
                <p id="modalComp" style="margin: 20px 0; color: #4b5563; font-size: 18px;"></p>
                <button class="btn-quote" id="modalAction">Inquire Now <i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <footer style="text-align: center; padding: 40px; font-size: 12px; font-weight: 800; text-transform: uppercase;">
        COPYRIGHT © 2026 ANSH HEALTHCARE LTD.
    </footer>

    <script src="script.js"></script>
</body>

</html>
