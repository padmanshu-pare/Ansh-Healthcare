<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Portfolio | Ansh Healthcare Portfolio</title>
    <meta name="description" content="Explore Ansh Healthcare's extensive product portfolio, including Gastro, Cardio, Neuro, and Diabetic formulations. Discover our premium healthcare solutions.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="catalog-page">

    <header>
        <div class="logo">ANSH HEALTHCARE<span>.</span></div>
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Home</a>
    </header>

    <section class="catalog-header reveal">
        <h1>Product <span>Portfolio</span></h1>
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="Search brands or salts...">
        </div>
    </section>

    <div class="filter-container reveal">
        <button class="filter-btn active" data-cat="all">All</button>
        <button class="filter-btn" data-cat="Gastro">Gastro</button>
        <button class="filter-btn" data-cat="Cardio">Cardio</button>
        <button class="filter-btn" data-cat="Neuro">Neuro</button>
        <button class="filter-btn" data-cat="Diabetic">Diabetic</button>
        <button class="filter-btn" data-cat="Other">Specialty</button>
    </div>

    <!-- The grid will be generated dynamically by script.js -->
    <main class="product-grid" id="mainGrid"></main>

    <div class="modal-overlay" id="productModal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <div class="modal-left"><img id="modalImg" src=""></div>
            <div class="modal-right">
                <span id="modalCat" class="category-tag"></span>
                <h2 id="modalTitle"></h2>
                <p id="modalComp" style="margin: 20px 0; color: #4b5563; font-size: 18px;"></p>
                <button class="btn-quote" id="modalAction">Inquire Now <i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <footer style="text-align: center; padding: 40px; font-size: 12px; font-weight: 800; text-transform: uppercase;">
        COPYRIGHT © 2026 ANSH HEALTHCARE LTD.
    </footer>

    <script src="script.js"></script>
</body>

</html>
